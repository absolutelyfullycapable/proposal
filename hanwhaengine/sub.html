<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common/css/swiper.css" />
    <link rel="stylesheet" href="./common/css/fonts.css" />
    <link rel="stylesheet" href="./common/css/style-subA.css" />
    <script src="./common/js/jquery-1.8.2.min.js"></script>
    <script src="./common/js/swiper.min.js"></script>
    <script src="./common/js/gsap.min.js"></script>
		<script src="./common/js/ScrollToPlugin.min.js"></script>
		<script src="./common/js/ScrollTrigger.min.js"></script>
    <script src="./common/js/subA.js"></script>
    <title>한화엔진 제안</title>
  </head>

  <body>
    <!-- header -->
    <header>
      <div class="inner">
        <h1>
          <a href="javascript:">
            <img src="common/images/header-logo-w.png" class="w" alt="">
            <img src="common/images/header-logo-c.png" class="c" alt="">
          </a>
        </h1>

        <a href="" class="gnb">
          <img src="common/images/header-gnb-w.png" class="w" alt="">
          <img src="common/images/header-gnb-c.png" class="c" alt="">
        </a>

        <div class="util">
          <img src="common/images/header-util-w.png" class="w" alt="">
          <img src="common/images/header-util-c.png" class="c" alt="">

          <a href="javascript:" class="one"></a>
          <a href="javascript:" class="two"></a>
        </div>
      </div>
    </header>

    <!-- kv -->
    <div class="kv-wrap">
      <div class="txt-box">
        <div class="left">
          <img src="./common/images/sub-kv-cate-txt.png" alt="" class="fade-motion">
          <img src="./common/images/sub-kv-tit-txt.png" alt="" class="fade-motion">
        </div>
        <div class="right">
          <img src="./common/images/sub-kv-desc-txt.png" alt="" class="fade-motion">
        </div>
      </div>
      <div class="bg-box">
        <img src="./common/images/sub-kv-img.jpg" alt="">
      </div>
    </div>

    <!-- content -->
    <div class="cont-wrap">
      <section class="cont-sec1">
        <div class="inner">
          <div class="tit scrl-motion">
            <img src="./common/images/sub-sec1-tit-txt.png" alt="">
          </div>
          <div class="desc scrl-motion">
            <img src="./common/images/sub-sec1-desc-txt.png" alt="">
          </div>
        </div>
      </section>
      <section class="cont-sec2">
        <div class="inner">
          <div class="tit scrl-motion">
            <img src="./common/images/sub-sec2-tit-txt.png" alt="">
          </div>
          <div class="feature-box scrl-motion">
            <div class="top">
              <img src="./common/images/sub-sec2-top-off.jpg" alt="" class="off active">
              <img src="./common/images/sub-sec2-top-on.jpg" alt="" class="on">
            </div>
            <div class="maintenance">
              <img src="./common/images/sub-sec2-maintenance-off.jpg" alt="" class="off active">
              <img src="./common/images/sub-sec2-maintenance-on.jpg" alt="" class="on">
            </div>
            <div class="eco">
              <img src="./common/images/sub-sec2-eco-off.jpg" alt="" class="off active">
              <img src="./common/images/sub-sec2-eco-on.jpg" alt="" class="on">
            </div>
            <div class="zero">
              <img src="./common/images/sub-sec2-zero-off.jpg" alt="" class="off active">
              <img src="./common/images/sub-sec2-zero-on.jpg" alt="" class="on">
            </div>
            <div class="needs">
              <img src="./common/images/sub-sec2-needs-off.jpg" alt="" class="off active">
              <img src="./common/images/sub-sec2-needs-on.jpg" alt="" class="on">
            </div>
            <div class="trust">
              <img src="./common/images/sub-sec2-trust-off.jpg" alt="" class="off active">
              <img src="./common/images/sub-sec2-trust-on.jpg" alt="" class="on">
            </div>
            <div class="box"></div>
          </div>
        </div>
      </section>
      <section class="cont-sec3">
        <div class="inner">
          <div class="tit-box">
            <img src="./common/images/sub-sec3-txt.png" alt="">
          </div>
          <div class="video-box">
            <div class="tab">
              <img src="./common/images/sub-sec3-vid-tab.png" alt="">
            </div>
            <div class="vid">
              <video src="./common/videos/sub-sec3-vid.mp4" muted></video>
            </div>
            <div class="btn">
              <button type="button">
                <img src="./common/images/sub-sec3-vid-btn.png" alt="">
              </button>
            </div>
          </div>
        </div>
      </section>
      <section class="cont-sec4">
        <div class="inner">
          <div class="top-box scrl-motion">
            <img src="./common/images/sub-sec4-tit-txt.png" alt="" class="tit">
            <img src="./common/images/sub-sec4-slide-btn.png" alt="" class="btn">
          </div>
          <div class="slide-box scrl-motion">
            <div class="slide-item slide-item1">
              <div class="img">
                <img src="./common/images/sub-sec4-img1-tit.png" alt="" class="item-tit">
                <img src="./common/images/sub-sec4-img1-desc.png" alt="" class="item-desc">
              </div>
              <img src="./common/images/sub-sec4-img1-txt.png" alt="">
            </div>
            <div class="slide-item slide-item2">
              <div class="img">
                <img src="./common/images/sub-sec4-img2-tit.png" alt="" class="item-tit">
                <img src="./common/images/sub-sec4-img2-desc.png" alt="" class="item-desc">
              </div>
              <img src="./common/images/sub-sec4-img1-txt.png" alt="">
            </div>
          </div>
        </div>
      </section>
      <section class="cont-sec5">
        <div class="pin-wrap">
          <div class="tit-box">
            <img src="./common/images/sub-sec5-tit.png" alt="" class="scrl-motion">
          </div>
          <div class="parallax-box">
            <div class="shape">
              <img src="./common/images/sub-sec5-shape1.png" alt="" class="shape1">
              <img src="./common/images/sub-sec5-shape2.png" alt="" class="shape2">
              <img src="./common/images/sub-sec5-shape3.png" alt="" class="shape3">
            </div>
            <div class="img">
              <img src="./common/images/sub-sec5-img1.png" alt="" class="img1">
              <img src="./common/images/sub-sec5-img2.png" alt="" class="img2">
              <img src="./common/images/sub-sec5-img3.png" alt="" class="img3">
            </div>
          </div>
        </div>
      </section>
      <section class="cont-sec6">
        <div class="prod-wrap">
          <div class="prod-item item1">
            <div class="tit-box">
              <div class="sub-tit">
                <img src="./common/images/sub-sec6-sub-tit.png" alt="" class="bk">
                <img src="./common/images/sub-sec6-sub-tit-wht.png" alt="" class="wht">
              </div>
              <img src="./common/images/sub-sec6-tit1.png" alt="">
            </div>
            <div class="img-box">
              <img src="./common/images/sub-sec6-bg-img1.jpg" alt="">
              <div class="dimd"></div>
            </div>
            <div class="util-box">
              <div class="download">
                <img src="./common/images/sub-sec6-brochure-img.png" alt="" class="brochure">
                <img src="./common/images/sub-sec6-brochure-download-btn.png" alt="">
              </div>
              <div class="gallery">
                <img src="./common/images/sub-sec6-gallery1.png" alt="">
              </div>
            </div>
          </div>
          <div class="prod-item item2">
            <div class="tit-box">
              <div class="sub-tit">
                <img src="./common/images/sub-sec6-sub-tit-wht.png" alt="" class="wht">
              </div>
              <img src="./common/images/sub-sec6-tit2.png" alt="">
            </div>
            <div class="util-box">
              <div class="download">
                <img src="./common/images/sub-sec6-brochure-img.png" alt="" class="brochure">
                <img src="./common/images/sub-sec6-brochure-download-btn.png" alt="">
              </div>
              <div class="gallery">
                <img src="./common/images/sub-sec6-gallery2.png" alt="">
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="cont-sec7">
        <div class="inner">
          <div class="tit-box scrl-motion">
            <img src="./common/images/sub-sec7-lib-tit.png" alt="">
          </div>
          <div class="lib-list scrl-motion">
            <img src="./common/images/sub-sec7-lib-list.png" alt="">
          </div>
        </div>
        <div class="banner-box scrl-motion">
          <img src="./common/images/sub-sec7-banner.png" alt="">
        </div>
        <div class="paging-box scrl-motion">
          <img src="./common/images/sub-sec7-paging.png" alt="">
        </div>
      </section>
    </div>

    <!-- footer -->
    <footer>
      <div class="inner">
        <a href="javascript:" class="bts"><img src="common/images/footer-bts.png" alt=""></a>
        <a href="javascript:" class="fam"><img src="common/images/footer-fam.png" alt=""></a>
        <a href="javascript:" class="copyright"><img src="common/images/footer-copyright.png" alt=""></a>
        <a href="javascript:" class="tit"><img src="common/images/footer-title.png" alt=""></a>
      </div>
    </footer>
  </body>
</html>
