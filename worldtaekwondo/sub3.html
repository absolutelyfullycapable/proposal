<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="./common/css/swiper.css" />
    <link rel="stylesheet" href="./common/css/fonts.css" />
    <link rel="stylesheet" href="./common/css/style-sub3.css" />
    <script src="./common/js/jquery-1.8.2.min.js"></script>
    <script src="./common/js/gsap.min.js"></script>
    <script src="./common/js/ScrollTrigger.min.js"></script>
    <script src="./common/js/swiper.min.js"></script>
    <script src="./common/js/sub3.js"></script>
    <title>세계태권도연맹 제안</title>
  </head>
  <body>
    <div class="wrap">
      <header class="header">
        <div class="top">
          <div class="inner">
            <img src="./common/images/img-header-top1.png" alt="">
            <img src="./common/images/img-header-top2.png" alt="">
          </div>
        </div>
        <div class="inner">
          <h1 class="logo">
            <a href="javascript:">
              <img src="./common/images/ico-logo.svg" alt="">
            </a>
          </h1>
          <div class="gnb">
            <a href="javascript:"></a>
            <img src="./common/images/img-gnb.png" alt="">
          </div>
          <div class="util">
            <img src="./common/images/img-util.png" alt="">
          </div>
        </div>
        <div class="menu">
          <div class="inner">
            <img src="./common/images/img-depth1-menu.jpg" alt="">
          </div>
        </div>
      </header>

      <div class="content">
        <div class="inner">
          <div class="progress-bar">
            <div class="progress-track"></div>
          </div>
          <div class="flex">
            <div class="left">
              <img src="./common/images/ico-prev.svg" alt="">
            </div>
            <div class="right">
              <img src="./common/images/sub3-img-conts.jpg" alt="">
            </div>
          </div>
        </div>
      </div>

      <footer>
        <a href="javascript:">
          <div class="inner">
            <img src="./common/images/img-footer.png" alt="">
          </div>
        </a>
      </footer>
    </div>
  </body>
</html>
