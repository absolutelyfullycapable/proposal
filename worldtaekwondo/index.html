<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common/css/swiper.css" />
    <link rel="stylesheet" href="./common/css/fonts.css" />
    <link rel="stylesheet" href="./common/css/style-main.css" />
    <script src="./common/js/jquery-1.8.2.min.js"></script>
    <script src="./common/js/swiper.min.js"></script>
    <script src="./common/js/gsap.min.js"></script>
    <script src="./common/js/ScrollToPlugin.min.js"></script>
    <script src="./common/js/ScrollTrigger.min.js"></script>
    <script src="./common/js/main.js"></script>
    <title>세계태권도연맹 제안</title>
  </head>

  <body>
    <div class="wrap main">
      <header class="header">
        <div class="top">
          <div class="inner">
            <img src="./common/images/img-header-top1.png" alt="">
            <img src="./common/images/img-header-top2.png" alt="">
          </div>
        </div>
        <div class="inner">
          <h1 class="logo">
            <a href="javascript:">
              <img src="./common/images/ico-logo.svg" alt="">
            </a>
          </h1>
          <div class="gnb">
            <a href="javascript:"></a>
            <img src="./common/images/img-gnb.png" alt="">
          </div>
          <div class="util">
            <img src="./common/images/img-util.png" alt="">
          </div>
        </div>
        <div class="menu">
          <div class="inner">
            <img src="./common/images/img-depth1-menu.jpg" alt="">
          </div>
        </div>
      </header>

      <div class="content">
        <div class="top-stories">
          <div class="inner">
            <img src="./common/images/img-top-stories.png" alt="">
          </div>
        </div>

        <div class="photo">
          <div class="inner">
            <img src="./common/images/img-photo-title.png" alt="">
          </div>
          <div class="flex">
            <div class="left">
              <img src="./common/images/img-photo-detail1.png" alt="">
            </div>
            <div class="right">
              <img src="./common/images/img-photo-detail2.png" alt="">
            </div>
          </div>
        </div>

        <div class="video">
          <div class="inner">
            <img src="./common/images/img-video-title.png" alt="">
          </div>
          <div class="flex">
            <div class="left">
              <img src="./common/images/img-video-detail1.png" alt="">
            </div>
            <div class="right">
              <img src="./common/images/img-video-detail2.png" alt="">
            </div>
          </div>
        </div>

        <div class="competitions">
          <div class="inner">
            <img src="./common/images/img-competitions.jpg" alt="">
          </div>
        </div>

        <div class="about">
          <div class="inner">
            <div class="tit">
              <img src="./common/images/txt-about-title.png" alt="">
            </div>
            <div class="desc">
              <img src="./common/images/txt-about-desc.png" alt="">
            </div>
          </div>
        </div>

        <div class="more">
          <div class="inner">
            <img src="./common/images/img-more-info.png" alt="">
          </div>
        </div>

        <button type="button" class="floating-btn">
          <p class="flex">
            <img src="./common/images/ico-floating.svg" alt="">
            <span><img src="./common/images/txt-floating.png" alt=""></span>
          </p>
          <img src="./common/images/img-floating-bg.png" alt="">
        </button>
      </div>

      <div class="layer-popup">
        <div class="item item1">
          <img src="./common/images/img-popup1.png" alt="" class="item-img">
        </div>
        <div class="item item2">
          <img src="./common/images/img-popup2.png" alt="" class="item-img">
        </div>
        <div class="item item3">
          <a href="./sub1.html">
            <img src="./common/images/img-popup3.png" alt="" class="item-img">
          </a>
          <a href="javascript:" class="btn-close">
            <img src="./common/images/ico-popup-close.svg" alt="">
          </a>
        </div>
        <div class="bg"></div>
      </div>

      <footer>
        <a href="./index2.html">
          <div class="inner">
            <img src="./common/images/img-footer.png" alt="">
          </div>
        </a>
      </footer>
    </div>
  </body>
</html>
