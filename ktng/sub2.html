<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common/css/swiper.css" />
    <link rel="stylesheet" href="./common/css/fonts.css" />
    <link rel="stylesheet" href="./common/css/style-sub2.css" />
    <script src="./common/js/jquery-1.8.2.min.js"></script>
    <script src="./common/js/swiper.min.js"></script>
    <script src="./common/js/gsap.min.js"></script>
    <script src="./common/js/ScrollToPlugin.min.js"></script>
    <script src="./common/js/ScrollTrigger.min.js"></script>
    <script src="./common/js/sub2.js"></script>
    <title>KT&G 제안</title>
  </head>

  <body>
    <div class="wrap">
      <header>
        <div class="inner">
          <a href="javascript:">
            <img src="./common/images/logo.png" alt="">
          </a>
          <nav>
            <img src="./common/images/gnb.png" alt="">
          </nav>
          <div class="utils">
            <img src="./common/images/utils.png" alt="">
          </div>
          <div class="sub-nav">
            <img src="./common/images/sub-nav.png" alt="">
          </div>
        </div>
      </header>

      <div class="contents">
        <!-- 배경 영상 -->
        <section class="bg-video-area">
          <video src="./common/videos/sub2-kv-video.mp4" muted autoplay loop></video>
        </section>

        <!-- 키 비주얼 -->
        <section class="kv-area">
          <div class="inner">
            <img src="./common/images/sub2-kv-img.png" alt="">
          </div>
        </section>

        <!-- 리스트 -->
        <section class="list-area">
          <div class="list-top-box">
            <div class="inner">
              <div class="list-category">
                <img src="./common/images/sub2-list-category.png" alt="">
              </div>
              <div class="list-util-btn">
                <div>
                  <img src="./common/images/sub2-util-btn1.png" alt="">
                </div>
                <button type="button" class="btn-tag">
                  <img src="./common/images/sub2-util-btn2.png" alt="">
                </button>
              </div>
              <div class="tag">
                <img src="./common/images/sub2-tag-list.png" alt="">
              </div>
            </div>
          </div>

          <div class="inner">
            <ul class="list-box">
              <li>
                <img src="./common/images/sub2-list-item1.png" alt="">
                <img src="./common/images/sub2-list-item2.png" alt="">
                <img src="./common/images/sub2-list-item3.png" alt="">
              </li>
              <li>
                <img src="./common/images/sub2-list-item4.png" alt="">
                <img src="./common/images/sub2-list-item5.png" alt="">
                <img src="./common/images/sub2-list-item6.png" alt="">
              </li>
              <li>
                <img src="./common/images/sub2-list-item7.png" alt="">
                <img src="./common/images/sub2-list-item8.png" alt="">
                <img src="./common/images/sub2-list-item9.png" alt="">
              </li>
              <li>
                <img src="./common/images/sub2-list-item10.png" alt="">
                <img src="./common/images/sub2-list-item11.png" alt="">
                <img src="./common/images/sub2-list-item12.png" alt="">
              </li>
            </ul>
          </div>

          <div class="pagination-area">
            <img src="./common/images/sub2-pagination.png" alt="">
          </div>
        </section>
      </div>

      <footer>
        <a href="javascript:">
          <img src="./common/images/footer.jpg" alt="">
        </a>
      </footer>
    </div>
  </body>
</html>
