<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="./common/css/swiper.css" />
    <link rel="stylesheet" href="./common/css/fonts.css" />
    <link rel="stylesheet" href="./common/css/style-sub1.css" />
    <script src="./common/js/jquery-1.8.2.min.js"></script>
    <script src="./common/js/gsap.min.js"></script>
    <script src="./common/js/ScrollTrigger.min.js"></script>
    <script src="./common/js/swiper.min.js"></script>
    <script src="./common/js/sub1.js"></script>
    <title>KT&G 제안</title>
  </head>

  <body>
    <div class="wrap">
      <header>
        <div class="inner">
          <a href="javascript:">
            <img src="./common/images/logo.png" alt="">
          </a>
          <nav>
            <img src="./common/images/gnb.png" alt="">
          </nav>
          <div class="utils">
            <img src="./common/images/utils.png" alt="">
          </div>
          <div class="sub-nav">
            <img src="./common/images/sub-nav.png" alt="">
          </div>
        </div>
      </header>

      <div class="contents">
        <!-- 키 비주얼 -->
        <section class="kv-area">
          <div class="inner title">
            <h2>
              <img src="./common/images/sub1-main-title.png" alt="">
            </h2>
            <div class="desc-box">
              <div class="desc">
                <img src="./common/images/sub1-main-desc.png" alt="">
              </div>
            </div>
          </div>

          <div class="inner kv">
            <div class="kv-box">
              <div class="kv-bg">
                <div class="kv-txt">
                  <img src="./common/images/sub1-kv-txt.png" alt="">
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- 지속가능경영 소개 -->
        <section class="info-area">
          <div class="inner">
            <div class="info-tit">
              <div class="tit-item">
                <img src="./common/images/sub1-info-tit1.png" alt="">
              </div>
              <div class="tit-item">
                <img src="./common/images/sub1-info-tit2.png" alt="">
              </div>
              <div class="tit-item">
                <img src="./common/images/sub1-info-tit3.png" alt="">
              </div>
              <div class="tit-item">
                <img src="./common/images/sub1-info-tit4.png" alt="">
              </div>
            </div>

            <!-- 환경경영 -->
            <div class="environ">
              <div class="img">
                <img src="./common/images/sub1-environ-img.jpg" alt="" class="bg">
                <img src="./common/images/sub1-environ-title.png" alt="" class="tit">
              </div>

              <ul class="txt">
                <li>
                  <img src="./common/images/sub1-environ-txt1.png" alt="">
                </li>
                <li>
                  <img src="./common/images/sub1-environ-txt2.png" alt="">
                </li>
                <li>
                  <img src="./common/images/sub1-environ-txt3.png" alt="">
                </li>
              </ul>
            </div>

            <!-- 사회공헌 -->
            <div class="social">
              <div class="img">
                <img src="./common/images/sub1-social-img.jpg" alt="" class="bg">
                <img src="./common/images/sub1-social-title.png" alt="" class="tit">
              </div>

              <ul class="txt">
                <li>
                  <img src="./common/images/sub1-social-txt1.png" alt="">
                </li>
                <li>
                  <img src="./common/images/sub1-social-txt2.png" alt="">
                </li>
                <li>
                  <img src="./common/images/sub1-social-txt3.png" alt="">
                </li>
              </ul>
            </div>

            <!-- 윤리경영 -->
            <div class="ethical">
              <div class="img">
                <img src="./common/images/sub1-ethical-img.jpg" alt="" class="bg">
                <img src="./common/images/sub1-ethical-title.png" alt="" class="tit">
              </div>

              <ul class="txt">
                <li>
                  <img src="./common/images/sub1-ethical-txt1.png" alt="">
                </li>
                <li>
                  <img src="./common/images/sub1-ethical-txt2.png" alt="">
                </li>
                <li>
                  <img src="./common/images/sub1-ethical-txt3.png" alt="">
                </li>
              </ul>
            </div>

            <!-- 미래경영 -->
            <div class="future">
              <div class="img">
                <img src="./common/images/sub1-future-img.jpg" alt="" class="bg">
                <img src="./common/images/sub1-future-title.png" alt="" class="tit">
              </div>

              <ul class="txt">
                <li>
                  <img src="./common/images/sub1-future-txt1.png" alt="">
                </li>
                <li>
                  <img src="./common/images/sub1-future-txt2.png" alt="">
                </li>
                <li>
                  <img src="./common/images/sub1-future-txt3.png" alt="">
                </li>
              </ul>
            </div>

            <div class="esg">
              <div class="tit motion">
                <img src="./common/images/sub1-esg-title.png" alt="">
              </div>
              <div class="desc motion">
                <img src="./common/images/sub1-esg-desc.png" alt="">
              </div>
              <div class="list">
                <p class="sub-tit motion">
                  <img src="./common/images/sub1-esg-sub-title1.png" alt="">
                </p>
                <img src="./common/images/sub1-esg-img1.png" alt="" class="motion">
                <img src="./common/images/sub1-esg-img2.png" alt="" class="motion">
                <img src="./common/images/sub1-esg-img3.png" alt="" class="motion">
                <img src="./common/images/sub1-esg-img4.png" alt="" class="motion">
                <img src="./common/images/sub1-esg-img5.png" alt="" class="motion">
                <img src="./common/images/sub1-esg-img6.png" alt="" class="motion">
                <img src="./common/images/sub1-esg-img7.png" alt="" class="motion">
                <div class="sub-tit motion">
                  <img src="./common/images/sub1-esg-sub-title2.png" alt="">
                </div>
                <img src="./common/images/sub1-esg-img8.png" alt="" class="motion">
              </div>
            </div>

            <div class="report">
              <div class="tit motion">
                <img src="./common/images/sub1-report-title.png" alt="">
              </div>
              <img src="./common/images/sub1-report-img.png" alt="" class="motion">
            </div>
          </div>
        </section>

        <!-- 지속가능경영 소식 -->
        <section class="news-area">
          <div class="inner">
            <div class="tit motion">
              <img src="./common/images/sub1-news-tit.png" alt="">
            </div>
            <ul class="list motion">
              <li>
                <img src="./common/images/sub1-news-list1.png" alt="">
              </li>
              <li>
                <img src="./common/images/sub1-news-list2.png" alt="">
              </li>
              <li>
                <img src="./common/images/sub1-news-list3.png" alt="">
              </li>
              <li>
                <img src="./common/images/sub1-news-list4.png" alt="">
              </li>
            </ul>
          </div>
        </section>

        <!-- 링크 -->
        <section class="link-area">
          <div class="inner">
            <div class="link-item">
              <img src="./common/images/sub1-link1.png" alt="">
            </div>
            <div class="link-item">
              <img src="./common/images/sub1-link2.png" alt="">
            </div>
          </div>
        </section>
      </div>

      <footer>
        <a href="javascript:">
          <img src="./common/images/footer.jpg" alt="">
        </a>
      </footer>
    </div>
  </body>
</html>
