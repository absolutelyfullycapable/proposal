<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common/css/swiper.css" />
    <link rel="stylesheet" href="./common/css/fonts.css" />
    <link rel="stylesheet" href="./common/css/style-sub1.css" />
    <script src="./common/js/jquery-1.8.2.min.js"></script>
    <script src="./common/js/swiper.min.js"></script>
    <script src="./common/js/gsap.min.js"></script>
		<script src="./common/js/ScrollToPlugin.min.js"></script>
		<script src="./common/js/ScrollTrigger.min.js"></script>
    <script src="./common/js/sub1.js"></script>
    <title>HTWO 제안</title>
  </head>

  <body>
    <!-- header -->
    <header class="wht">
      <a href="javascript:" class="logo"></a>
      <nav>
        <a href="javascript:">Hydrogen</a>
        <a href="javascript:">Technology</a>
        <a href="javascript:">Worldwide</a>
        <a href="javascript:">Organization</a>
      </nav>
      <div class="util"></div>
    </header>

    <!-- content -->
    <div id="subBody">
      <!-- kv -->
      <section class="kv">
        <div class="inner">
          <div class="left">
            <img src="./common/images/sub1-kv-cate.svg" alt="" class="motion">
            <img src="./common/images/sub1-kv-tit.svg" alt="" class="motion">
          </div>
          <div class="right">
            <img src="./common/images/sub1-kv-txt1.svg" alt="" class="motion">
            <img src="./common/images/sub1-kv-txt2.svg" alt="" class="motion">
          </div>
        </div>
        <div class="bg">
          <img src="./common/images/sub1-kv-bg.jpg" alt="">
        </div>
        <div class="dimd"></div>
      </section>

      <!-- value chain -->
      <section class="value-chain scrl-motion">
        <div class="inner">
          <div class="left">
            <img src="./common/images/sub1-vc-tit.svg" alt="" class="motion">
          </div>
          <div class="right">
            <img src="./common/images/sub1-vc-txt.svg" alt="" class="motion">
          </div>
        </div>
      </section>

      <!-- fixed bg -->
      <section class="fixed-bg"></section>

      <!-- electrolysis -->
      <section class="electrolysis scrl-motion">
        <div class="inner">
          <div class="tit-area">
            <div class="left">
              <img src="./common/images/sub1-elec-tit.svg" alt="" class="motion">
            </div>
            <div class="right">
              <img src="./common/images/sub1-elec-txt.svg" alt="" class="motion">
            </div>
          </div>
          <div class="list-area">
            <div class="left">
              <div class="progress-box">
                <div class="progress-thumb"></div>
              </div>
            </div>
            <div class="right">
              <div class="list-item">
                <img src="./common/images/sub1-elec-right-item1.jpg" alt="">
              </div>
              <div class="list-item">
                <img src="./common/images/sub1-elec-right-item2.jpg" alt="">
              </div>
              <div class="list-item">
                <img src="./common/images/sub1-elec-right-item3.jpg" alt="">
              </div>
              <div class="list-item">
                <img src="./common/images/sub1-elec-right-item4.jpg" alt="">
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- core value -->
      <section class="core-value">
        <div class="inner">
          <div class="tit-area">
            <div class="left">
              <img src="./common/images/sub1-cv-tit.svg" alt="" class="motion">
            </div>
            <div class="right">
              <img src="./common/images/sub1-cv-txt.svg" alt="" class="motion">
            </div>
          </div>
          <div class="list-area">
            <div class="list-item motion">
              <div class="desc-box">
                <img src="./common/images/sub1-cv-icon1.svg" alt="">
                <img src="./common/images/sub1-cv-item1-tit.svg" alt="">
                <img src="./common/images/sub1-cv-item1-txt.svg" alt="">
              </div>
            </div>
            <div class="list-item motion">
              <div class="desc-box">
                <img src="./common/images/sub1-cv-icon2.svg" alt="">
                <img src="./common/images/sub1-cv-item2-tit.svg" alt="">
                <img src="./common/images/sub1-cv-item2-txt.svg" alt="">
              </div>
            </div>
            <div class="list-item motion">
              <div class="desc-box">
                <img src="./common/images/sub1-cv-icon3.svg" alt="">
                <img src="./common/images/sub1-cv-item3-tit.svg" alt="">
                <img src="./common/images/sub1-cv-item3-txt.svg" alt="">
              </div>
            </div>
            <div class="list-item motion">
              <div class="desc-box">
                <img src="./common/images/sub1-cv-icon4.svg" alt="">
                <img src="./common/images/sub1-cv-item4-tit.svg" alt="">
                <img src="./common/images/sub1-cv-item4-txt.svg" alt="">
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- connectivity -->
      <section class="connectivity">
        <div class="inner">
          <div class="tit-area">
            <div class="left">
              <img src="./common/images/sub1-connec-tit.svg" alt="" class="motion">
            </div>
            <div class="right">
              <img src="./common/images/sub1-connec-txt.svg" alt="" class="motion">
            </div>
          </div>
          <div class="tab-area motion">
            <div class="tab-box">
              <a href="javascript:" class="on">연료전지</a>
              <a href="javascript:">PEM 수전해</a>
            </div>
            <div class="cont-box">
              <div class="cont-item on">
                <img src="./common/images/sub1-connec-img1.png" alt="">
              </div>
              <div class="cont-item">
                <img src="./common/images/sub1-connec-img2.png" alt="">
                <img src="./common/images/sub1-connec-img3.gif" alt="" class="gif">
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- possibility -->
      <section class="possibility">
        <div class="inner">
          <div class="left motion">
            <img src="./common/images/sub1-possi-map1.jpg" class="on" alt="">
            <img src="./common/images/sub1-possi-map2.jpg" alt="">
          </div>
          <div class="right">
            <img src="./common/images/sub1-possi-cate.svg" alt="" class="motion">
            <img src="./common/images/sub1-possi-tit.svg" alt="" class="motion">
            <img src="./common/images/sub1-possi-txt.svg" alt="" class="motion">
            <div class="tab-area motion">
              <div class="tab-box">
                <a href="javascript:" class="on"><span>광주</span></a>
                <a href="javascript:"><span>보령</span></a>
                <p>부안</p>
                <p>제주</p>
                <p>유럽</p>
                <p>서남권</p>
              </div>
              <div class="cont-box">
                <div class="cont-item on">
                  <img src="./common/images/sub1-possi-desc1.svg" alt="">
                </div>
                <div class="cont-item">
                  <img src="./common/images/sub1-possi-desc2.svg" alt="">
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- etc -->
      <section class="etc">
        <div class="inner motion">
          <div class="left">
            <div class="btn-wrap">
              <a href="javascript:" class="motion">
                <img src="./common/images/sub1-etc-btn1.svg" alt="">
              </a>
              <a href="javascript:" class="motion">
                <img src="./common/images/sub1-etc-btn2.svg" alt="">
              </a>
            </div>
          </div>
          <div class="right">
            <img src="./common/images/sub1-etc-txt.svg" class="motion" alt="">
            <a href="javascript:" class="motion">암모니아 크래킹 기술</a>
          </div>
        </div>
      </section>
    </div>

    <!-- footer -->
    <footer>
      <a href="javascript:">
        <img src="./common/images/footer.jpg" alt="">
      </a>
    </footer>
  </body>
</html>
