    <script>
      (function () {
        // ripple
        const rippleInstances = [];
        const $swiperProgressBar = $(".main-kv .swiper-util .progress .bar");


        // active slide
        function activeSlideMotion(swiper) {
          const currentRealIndex = swiper.realIndex;

          $(swiper.slides).each(function () {
            const $slide = $(this);
            const slideRealIndex = $slide.attr("data-swiper-slide-index");

            if (slideRealIndex != currentRealIndex) return;

            const $txt = $slide.find(".txt");
            const $bg = $slide.find(".bg");
            const $canvas = $slide.find(".ripple-canvas");

            const tl = gsap.timeline();

            tl.to($txt, {
              onStart: function () {
                $txt.addClass("active");
              }
            })
            .to($bg, {
              onStart: function () {
                $bg.addClass("active");
              }
            }, "<")
            .to($canvas, {
              onStart: function () {
                $canvas.addClass("active");
              }
            }, "<");
          });
        }


        // reset slide
        function resetSlideMotion(swiper) {
          const currentRealIndex = swiper.realIndex;

          $(swiper.slides).each(function () {
            const $slide = $(this);
            const slideRealIndex = $slide.attr("data-swiper-slide-index");

            const $txt = $slide.find(".txt");
            const $bg = $slide.find(".bg");
            const $canvas = $slide.find(".ripple-canvas");

            // 같은 realIndex면 active 유지
            if (slideRealIndex == currentRealIndex) {
              $txt.addClass("active");
              $bg.addClass("active");
              $canvas.addClass("active");
            } else {
              $txt.removeClass("active");
              $bg.removeClass("active");
              $canvas.removeClass("active");
            }
          });
        }


        // kv
        let kvSwiper, mainSwiperCurrent, mainSwiperTotal;
        let isInit = false;
        let prevIndex = 0;

        kvSwiper = new Swiper(".kv-swiper", {
          observer: true,
          observeParents: true,
          speed: 1000,
          loop: true,
          autoplay: false,
          delay: 1000,
          on: {
            init: function () {
              const swiper = this;

              // pagination
              mainSwiperTotal = this.slides.length - (this.loopedSlides * 2);
              mainSwiperCurrent = this.realIndex + 1;

              $(".main-kv .swiper-util .current").text(`0${mainSwiperCurrent}`);
              $(".main-kv .swiper-util .total").text(`0${mainSwiperTotal}`);
            },
            slideChangeTransitionStart: function () {
              // pagination
              mainSwiperCurrent = this.realIndex + 1;

              setTimeout(function () {
                $(".main-kv .swiper-util .current").text(`0${mainSwiperCurrent}`);
              }, 500);

              // progress bar
              gsap.killTweensOf($swiperProgressBar);
              gsap.set($swiperProgressBar, {
                delay: 0.5,
                width: "0%"
              });
            },
            slideChangeTransitionEnd: function () {
              // ripple
              rippleInstances.forEach(function (inst, i) {
                if (i === kvSwiper.realIndex) inst.start();
                else inst.stop();
              });

              if (!isInit) {
                isInit = true;
                return;
              };

              resetSlideMotion(this);
              activeSlideMotion(this);
              setTimeout(function () {
                $(".main-kv .kv-swiper .swiper-slide .txt.active").removeClass("active");
              }, 4800);

              // progress bar
              gsap.to($swiperProgressBar, {
                duration: 5,
                width: "100%"
              });
            },
          }
        });


        $('.kv-swiper .swiper-slide').on('click', function() {
          kvSwiper.slideNext();
        });


        // 인트로 모션
        setTimeout(function () {
          const introTl = gsap.timeline({
            onComplete: () => {
              // 진입 시 모션
              gsap.to(".intro", 0.7, {top: "-100%", ease: Power1.easeOut});
              $("body").removeClass("stop-scrl");

              gsap.to("header", 0.7, {top: 0, ease: Power1.easeOut, delay: 0.8});
              gsap.to(".main-kv .swiper-util", 0.7, {bottom: "311px", opacity: 1, ease: Power1.easeOut, delay: 0.8});
              gsap.to($swiperProgressBar, {duration: 4.2, width: "100%", ease: Power1.easeOut, delay: 0.8});
              setTimeout(() => {
                kvSwiper.params.autoplay.delay = 5000;
                kvSwiper.params.autoplay.disableOnInteraction = false;
                kvSwiper.autoplay.start();
                activeSlideMotion(kvSwiper);
              }, 800);
              setTimeout(function () {
                $(".main-kv .kv-swiper .swiper-slide .txt.active").removeClass("active");
              }, 4700);
            }
          });

          introTl.to(".intro .fir", 0.7, {width: "auto", ease: Power1.easeOut})
          .to(".intro .sec", 0.7, {width: "auto", ease: Power1.easeOut})
          .to({}, 0.7, {});
        }, 10);


        var RIPPLE_SCALE = 0.5;
        var DAMPING = 0.96;
        var AUTO_DROP_INTERVAL = 2000;

        function createRippleInstance(slide) {
          var bgImg  = slide.querySelector('.bg');
          var canvas = slide.querySelector('.ripple-canvas');
          var ctx    = canvas.getContext('2d');

          var W = 0, H = 0, ripW = 0, ripH = 0;
          var buf1, buf2;
          var baseCanvas = document.createElement('canvas');
          var baseCtx    = baseCanvas.getContext('2d');
          var baseData   = null;
          var outputData = null;

          var mouseX = -1, mouseY = -1;
          var lastMX = -1, lastMY = -1;
          var isHovering = false;
          var lastDropTime = 0;
          var active = false;
          var rafId  = null;

          function resize() {
            var rect = slide.getBoundingClientRect();
            W = rect.width  || window.innerWidth;
            H = rect.height || window.innerHeight;

            canvas.width  = W;
            canvas.height = H;

            ripW = Math.floor(W * RIPPLE_SCALE);
            ripH = Math.floor(H * RIPPLE_SCALE);

            buf1 = new Float32Array(ripW * ripH);
            buf2 = new Float32Array(ripW * ripH);

            baseCanvas.width  = W;
            baseCanvas.height = H;
            outputData = ctx.createImageData(W, H);

            rebuildBase();
          }

          function rebuildBase() {
            if (!W || !H) return;
            drawBase();
            baseData = baseCtx.getImageData(0, 0, W, H);
          }

          function drawBase() {
            baseCtx.clearRect(0, 0, W, H);
            if (!bgImg.complete || !bgImg.naturalWidth) return;

            var imgRatio    = bgImg.naturalWidth / bgImg.naturalHeight;
            var canvasRatio = W / H;
            var drawW, drawH, ox, oy;

            if (imgRatio > canvasRatio) {
              drawH = H; drawW = H * imgRatio;
              ox = (W - drawW) / 2; oy = 0;
            } else {
              drawW = W; drawH = W / imgRatio;
              ox = 0; oy = (H - drawH) / 2;
            }
            baseCtx.drawImage(bgImg, ox, oy, drawW, drawH);
          }

          function addRipple(x, y, radius, strength) {
            var rx = Math.floor(x * RIPPLE_SCALE);
            var ry = Math.floor(y * RIPPLE_SCALE);
            var r  = Math.floor(radius * RIPPLE_SCALE);

            for (var dy = -r; dy <= r; dy++) {
              for (var dx = -r; dx <= r; dx++) {
                var dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > r) continue;
                var px = rx + dx, py = ry + dy;
                if (px < 0 || px >= ripW || py < 0 || py >= ripH) continue;
                buf1[py * ripW + px] += strength * (1 - dist / r);
              }
            }
          }

          function propagate() {
            for (var y = 1; y < ripH - 1; y++) {
              for (var x = 1; x < ripW - 1; x++) {
                var idx = y * ripW + x;
                buf2[idx] = (buf1[idx-1] + buf1[idx+1] + buf1[idx-ripW] + buf1[idx+ripW]) / 2 - buf2[idx];
                buf2[idx] *= DAMPING;
              }
            }
            var tmp = buf1; buf1 = buf2; buf2 = tmp;
          }

          function render() {
            if (!baseData || !outputData) return;
            var src = baseData.data;
            var dst = outputData.data;
            var inv = 1 / RIPPLE_SCALE;

            dst.set(src);

            for (var ry = 1; ry < ripH - 1; ry++) {
              for (var rx = 1; rx < ripW - 1; rx++) {
                var ridx = ry * ripW + rx;
                var ddx  = buf1[ridx-1]    - buf1[ridx+1];
                var ddy  = buf1[ridx-ripW] - buf1[ridx+ripW];
                if (ddx*ddx + ddy*ddy < 0.25) continue;

                var MAX_DISP = 14;
                var fdx = Math.round(ddx * inv);
                var fdy = Math.round(ddy * inv);
                if (fdx >  MAX_DISP) fdx =  MAX_DISP;
                if (fdx < -MAX_DISP) fdx = -MAX_DISP;
                if (fdy >  MAX_DISP) fdy =  MAX_DISP;
                if (fdy < -MAX_DISP) fdy = -MAX_DISP;

                var fyStart = Math.floor(ry * inv);
                var fxStart = Math.floor(rx * inv);
                var fyEnd   = Math.min(Math.ceil((ry+1) * inv), H-1);
                var fxEnd   = Math.min(Math.ceil((rx+1) * inv), W-1);

                for (var fy = fyStart; fy < fyEnd; fy++) {
                  for (var fx = fxStart; fx < fxEnd; fx++) {
                    var srcX = Math.min(Math.max(fx + fdx, 0), W-1);
                    var srcY = Math.min(Math.max(fy + fdy, 0), H-1);
                    var si   = (srcY * W + srcX) << 2;
                    var di   = (fy   * W + fx  ) << 2;
                    dst[di]   = src[si];
                    dst[di+1] = src[si+1];
                    dst[di+2] = src[si+2];
                  }
                }
              }
            }
            ctx.putImageData(outputData, 0, 0);
          }

          function autoDrop(now) {
            if (now - lastDropTime >= AUTO_DROP_INTERVAL) {
              if (W && H) addRipple(Math.random() * W, Math.random() * H, 50, 250);
              lastDropTime = now;
            }
          }

          function loop(now) {
            if (!active) { rafId = null; return; }
            autoDrop(now);

            if (isHovering && mouseX >= 0) {
              var d = Math.sqrt((mouseX-lastMX)**2 + (mouseY-lastMY)**2);
              if (d > 2) {
                addRipple(mouseX, mouseY, 35, 200);
                lastMX = mouseX; lastMY = mouseY;
              }
            }

            propagate();
            render();
            rafId = requestAnimationFrame(loop);
          }

          function toLocal(clientX, clientY) {
            var rect = canvas.getBoundingClientRect();
            return {
              x: (clientX - rect.left) * (W / rect.width),
              y: (clientY - rect.top)  * (H / rect.height)
            };
          }

          slide.addEventListener('mousemove', function (e) {
            var p = toLocal(e.clientX, e.clientY);
            mouseX = p.x; mouseY = p.y; isHovering = true;
          });
          slide.addEventListener('mouseleave', function () {
            isHovering = false; mouseX = -1; mouseY = -1;
          });
          slide.addEventListener('click', function (e) {
            var p = toLocal(e.clientX, e.clientY);
            addRipple(p.x, p.y, 70, 500);
          });
          slide.addEventListener('touchmove', function (e) {
            e.preventDefault();
            var t = e.touches[0];
            var p = toLocal(t.clientX, t.clientY);
            mouseX = p.x; mouseY = p.y; isHovering = true;
          }, { passive: false });
          slide.addEventListener('touchend', function () { isHovering = false; });

          function start() {
            if (active) return;
            active = true;
            resize();
            if (!rafId) rafId = requestAnimationFrame(loop);
          }
          function stop() {
            active = false;
          }

          bgImg.addEventListener('load', rebuildBase);
          if (bgImg.complete) rebuildBase();

          window.addEventListener('resize', function () { if (active) resize(); });

          return { start, stop };
        }

        document.querySelectorAll('.kv-swiper .swiper-slide:not(.swiper-slide-duplicate)').forEach(function (slide, i) {
          rippleInstances[i] = createRippleInstance(slide);
        });

        setTimeout(function () {
          rippleInstances[kvSwiper.realIndex] && rippleInstances[kvSwiper.realIndex].start();
        }, 900);
      })();
    </script>

    <script>
      (function () {
        function createTitleRippleInstance() {
          const wrap = document.querySelector('.title-wrap');
          const canvas = wrap.querySelector('.ripple-canvas-title');
          const img = wrap.querySelector('img');
          const ctx = canvas.getContext('2d');

          let W = 0, H = 0, ripW = 0, ripH = 0;
          let buf1, buf2;

          const baseCanvas = document.createElement('canvas');
          const baseCtx = baseCanvas.getContext('2d');

          let baseData, outputData;
          let rafId = null;
          let active = false;
          let lastMX = -1, lastMY = -1;

          const RIPPLE_SCALE = 0.5;
          const DAMPING = 0.96;

          function resize() {
            const rect = img.getBoundingClientRect();

            W = rect.width;
            H = rect.height;

            canvas.width = W;
            canvas.height = H;
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';

            ripW = Math.floor(W * RIPPLE_SCALE);
            ripH = Math.floor(H * RIPPLE_SCALE);

            buf1 = new Float32Array(ripW * ripH);
            buf2 = new Float32Array(ripW * ripH);

            baseCanvas.width = W;
            baseCanvas.height = H;
            outputData = ctx.createImageData(W, H);

            drawBase();
            baseData = baseCtx.getImageData(0, 0, W, H);
          }

          function drawBase() {
            baseCtx.clearRect(0, 0, W, H);
            if (!img.complete || !img.naturalWidth) return;
            baseCtx.drawImage(img, 0, 0, W, H);
          }

          function addRipple(x, y, r, strength) {
            const rx = Math.floor(x * RIPPLE_SCALE);
            const ry = Math.floor(y * RIPPLE_SCALE);
            const radius = Math.floor(r * RIPPLE_SCALE);

            for (let dy = -radius; dy <= radius; dy++) {
              for (let dx = -radius; dx <= radius; dx++) {
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > radius) continue;
                const px = rx + dx, py = ry + dy;
                if (px < 0 || px >= ripW || py < 0 || py >= ripH) continue;
                buf1[py * ripW + px] += strength * (1 - dist / radius);
              }
            }
          }

          function propagate() {
            for (let y = 1; y < ripH - 1; y++) {
              for (let x = 1; x < ripW - 1; x++) {
                const idx = y * ripW + x;
                buf2[idx] = (buf1[idx-1] + buf1[idx+1] + buf1[idx-ripW] + buf1[idx+ripW]) / 2 - buf2[idx];
                buf2[idx] *= DAMPING;
              }
            }
            [buf1, buf2] = [buf2, buf1];
          }

        function render() {
        if (!baseData || !outputData) return;

        ctx.clearRect(0, 0, W, H);

        const src = baseData.data;
        const dst = outputData.data;
        const inv = 1 / RIPPLE_SCALE;

        dst.set(src);

        for (let ry = 1; ry < ripH - 1; ry++) {
          for (let rx = 1; rx < ripW - 1; rx++) {
            const idx = ry * ripW + rx;
            const ddx = buf1[idx-1] - buf1[idx+1];
            const ddy = buf1[idx-ripW] - buf1[idx+ripW];
            if (ddx*ddx + ddy*ddy < 0.25) continue;

            const MAX_DISP = 14;
            let fdx = Math.max(-MAX_DISP, Math.min(MAX_DISP, Math.round(ddx * inv)));
            let fdy = Math.max(-MAX_DISP, Math.min(MAX_DISP, Math.round(ddy * inv)));

            const fyStart = Math.floor(ry * inv);
            const fxStart = Math.floor(rx * inv);
            const fyEnd = Math.min(Math.ceil((ry+1) * inv), H-1);
            const fxEnd = Math.min(Math.ceil((rx+1) * inv), W-1);

            for (let fy = fyStart; fy < fyEnd; fy++) {
              for (let fx = fxStart; fx < fxEnd; fx++) {
                const srcX = Math.min(Math.max(fx + fdx, 0), W-1);
                const srcY = Math.min(Math.max(fy + fdy, 0), H-1);
                const si = (srcY * W + srcX) << 2;
                const di = (fy * W + fx) << 2;
                dst[di]   = src[si];
                dst[di+1] = src[si+1];
                dst[di+2] = src[si+2];
                dst[di+3] = src[si+3];
              }
            }
          }
        }
        ctx.putImageData(outputData, 0, 0);
      }
          function loop() {
            if (!active) return;
            propagate();
            render();
            rafId = requestAnimationFrame(loop);
          }

          function start() {
            if (active) return;
            active = true;
            resize();
            loop();
          }

          canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const d = Math.sqrt((x - lastMX) ** 2 + (y - lastMY) ** 2);
            if (d > 1) {
              addRipple(x, y, 10, 10);
              lastMX = x; lastMY = y;
            }
          });

          canvas.addEventListener('mouseleave', () => {
            lastMX = -1; lastMY = -1;
          });

          window.addEventListener('resize', () => { if (active) resize(); });

          if (img.complete && img.naturalWidth) {
            start();
          } else {
            img.onload = start;
          }
        }

        createTitleRippleInstance();
      })();
    </script>
  </body>
</html>
