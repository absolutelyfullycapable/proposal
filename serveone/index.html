<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common/css/swiper.css" />
    <link rel="stylesheet" href="./common/css/fonts.css" />
    <link rel="stylesheet" href="./common/css/style.css" />
    <script src="./common/js/jquery-1.8.2.min.js"></script>
    <script src="./common/js/swiper.min.js"></script>
    <script src="./common/js/gsap.min.js"></script>
    <script src="./common/js/ScrollToPlugin.min.js"></script>
    <script src="./common/js/ScrollTrigger.min.js"></script>
    <script src="./common/js/script.js"></script>
    <title>서브원 제안</title>
  </head>

  <body>
    <!-- header -->
    <header>
      <div class="inner">
        <a href="javascript:" class="logo">
          <img src="./common/images/main-icon-logo.png" alt="">
        </a>
        <div class="gnb">
          <a href="javascript:"><span>서브원</span></a>
          <a href="javascript:"><span>사업소개</span></a>
          <a href="javascript:"><span>지속가능경영</span></a>
          <a href="javascript:"><span>미디어라이브러리</span></a>
          <a href="javascript:"><span>고객지원</span></a>
          <a href="javascript:" class="link"><span>채용</span></a>
          <div class="menu-wrap">
            <img src="./common/images/main-menu.jpg" alt="">
          </div>
        </div>
        <div class="util-wrap">
          <img src="./common/images/main-sub-menu.png" alt="" class="sub-menu">
          <img src="./common/images/main-util.png" alt="" class="util">
        </div>
      </div>
    </header>

    <!-- content -->
    <div id="mainBody">
      <!-- kv -->
      <section class="kv-wrap">
        <div class="swiper-area">
          <div class="kv-swiper">
            <div class="swiper-wrapper">
              <div class="swiper-slide slide1">
                <div class="tit-area">
                  <div class="tit">
                    <p class="motion"><img src="./common/images/main-kv-tit1-1.png" alt=""></p>
                    <p class="motion"><img src="./common/images/main-kv-tit1-2.png" alt=""></p>
                    <p class="motion"><img src="./common/images/main-kv-tit1-3.png" alt=""></p>
                  </div>
                  <img src="./common/images/main-kv-desc1.png" alt="" class="motion">
                </div>
                <div class="bg-area">
                  <video src="./common/videos/main-kv-bg.mp4" muted loop></video>
                </div>
              </div>
              <div class="swiper-slide slide2">
                <div class="tit-area">
                  <div class="tit">
                    <p class="motion"><img src="./common/images/main-kv-tit2-1.png" alt=""></p>
                    <p class="motion"><img src="./common/images/main-kv-tit2-2.png" alt=""></p>
                  </div>
                  <img src="./common/images/main-kv-desc2.png" alt="" class="motion">
                </div>
                <div class="bg-area">
                  <img src="./common/images/main-kv-bg2.jpg" alt="">
                </div>
              </div>
              <div class="swiper-slide slide3">
                <div class="tit-area">
                  <div class="tit">
                    <p class="motion"><img src="./common/images/main-kv-tit3-1.png" alt=""></p>
                    <p class="motion"><img src="./common/images/main-kv-tit3-2.png" alt=""></p>
                  </div>
                  <img src="./common/images/main-kv-desc3.png" alt="" class="motion">
                </div>
                <div class="bg-area">
                  <img src="./common/images/main-kv-bg3.jpg" alt="">
                </div>
              </div>
            </div>
            <div class="swiper-util">
              <div class="pagination">
                <span class="current"></span>
                <div class="progress-bar">
                  <p></p>
                </div>
                <span class="total"></span>
              </div>
              <img src="./common/images/main-kv-util.png" alt="">
            </div>
          </div>

          <div class="search-box">
            <div class="search-input">
              <img src="./common/images/main-kv-search-off.png" alt="" class="off active">
              <img src="./common/images/main-kv-search-on.png" alt="" class="on">
            </div>
            <div class="search-result">
              <img src="./common/images/main-kv-search-keywords.png" alt="">
            </div>
            <a href="javascript:" class="btn-close">
              <img src="./common/images/main-kv-search-close-btn.png" alt="">
            </a>
          </div>
        </div>
      </section>

      <!-- support -->
      <section class="support-wrap">
        <div class="inner">
          <div class="tit-area">
            <img src="./common/images/main-support-tit.png" alt="" class="scroll-motion">
            <img src="./common/images/main-support-desc.png" alt="" class="scroll-motion">
          </div>
          <div class="list-area">
            <div class="flex">
              <div class="list-item item1 up">
                <img src="./common/images/main-support-item3-tit.png" alt="" class="tit">
                <img src="./common/images/main-support-item3-desc.png" alt="" class="desc">
                <img src="./common/images/main-support-item3-cate.png" alt="" class="cate">
                <img src="./common/images/main-support-item3-bg.png" alt="" class="bg">
              </div>
              <div class="list-item item2 up">
                <img src="./common/images/main-support-item4-tit.png" alt="" class="tit">
                <img src="./common/images/main-support-item4-desc.png" alt="" class="desc">
                <img src="./common/images/main-support-item4-cate.png" alt="" class="cate">
                <img src="./common/images/main-support-item4-bg.png" alt="" class="bg">
              </div>
            </div>
            <div class="flex">
              <div class="list-item item3">
                <img src="./common/images/main-support-item1-tit.png" alt="" class="tit">
                <img src="./common/images/main-support-item1-desc.png" alt="" class="desc">
                <img src="./common/images/main-support-item1-cate.png" alt="" class="cate">
                <img src="./common/images/main-support-item1-bg.png" alt="" class="bg">
              </div>
              <div class="list-item item4">
                <img src="./common/images/main-support-item2-tit.png" alt="" class="tit">
                <img src="./common/images/main-support-item2-desc.png" alt="" class="desc">
                <img src="./common/images/main-support-item2-cate.png" alt="" class="cate">
                <img src="./common/images/main-support-item2-bg.png" alt="" class="bg">
              </div>
            </div>
          </div>
          <div class="bg-area">
            <video src="./common/videos/main-support-bg.mp4" muted></video>
          </div>
        </div>
      </section>

      <!-- business -->
      <section class="business-wrap">
        <div class="inner">
          <div class="tit-area">
            <img src="./common/images/main-business-tit.png" alt="" class="scroll-motion">
            <img src="./common/images/main-business-desc.png" alt="" class="scroll-motion">
          </div>
          <div class="list-area">
            <div class="list-item item1">
              <img src="./common/images/main-business-item1-tit.png" alt="" class="tit">
              <img src="./common/images/main-business-item1-desc.png" alt="" class="desc">
              <img src="./common/images/main-business-item1-cate.png" alt="" class="cate">
              <img src="./common/images/main-business-item1-bg1.png" alt="" class="bg bg1">
              <img src="./common/images/main-business-item1-bg2.png" alt="" class="bg bg2">
            </div>
            <div class="list-item item2">
              <img src="./common/images/main-business-item2-tit.png" alt="" class="tit">
              <img src="./common/images/main-business-item2-desc.png" alt="" class="desc">
              <img src="./common/images/main-business-item2-cate.png" alt="" class="cate">
              <img src="./common/images/main-business-item2-bg1.png" alt="" class="bg bg1">
              <img src="./common/images/main-business-item2-bg2.png" alt="" class="bg bg2">
            </div>
          </div>
          <div class="bg-area">
            <video src="./common/videos/main-business-bg.mp4" muted></video>
          </div>
        </div>
      </section>

      <!-- info -->
      <section class="info-wrap">
        <div class="cont-area">
          <div class="tit-area">
            <img src="./common/images/main-info-sub-tit.png" alt="">
            <p class="tit">
              <span>안정적 경영, 업계 최고의 인프라, 지속적인 투자를 통해</span>
              <span>글로벌 구매 솔루션 전문기업으로</span>
              <span>가치를 제공하고 있습니다</span>
            </p>
          </div>
          <div class="list-area">
            <img src="./common/images/main-info-item1.png" alt="" class="item item1">
            <img src="./common/images/main-info-item2.png" alt="" class="item item2">
            <img src="./common/images/main-info-item3.png" alt="" class="item item3">
            <img src="./common/images/main-info-item4.png" alt="" class="item item4">
            <img src="./common/images/main-info-item5.png" alt="" class="item item5">
          </div>
        </div>
        <div class="bg-area">
          <img src="./common/images/main-info-bg.jpg" alt="">
          <div class="bg-dimd"></div>
        </div>
      </section>

      <!-- catalog -->
      <section class="catalog-wrap">
        <div class="inner">
          <div class="tit-area">
            <img src="./common/images/main-catalog-sub-tit.png" alt="">
            <img src="./common/images/main-catalog-tit.png" alt="">
            <img src="./common/images/main-catalog-tab.png" alt="" class="tab">
          </div>
          <div class="list-area">
            <img src="./common/images/main-catalog-item1.jpg" alt="">
            <img src="./common/images/main-catalog-item2.jpg" alt="">
            <img src="./common/images/main-catalog-item3.jpg" alt="">
            <img src="./common/images/main-catalog-item4.jpg" alt="">
          </div>
        </div>
      </section>

      <!-- esg -->
      <section class="esg-wrap">
        <div class="inner">
          <img src="./common/images/main-esg-sub-tit.png" alt="" class="sub-tit">
          <div class="tit-area">
            <p><img src="./common/images/main-esg-tit1.png" alt=""></p>
            <p><img src="./common/images/main-esg-tit2.png" alt=""></p>
            <p><img src="./common/images/main-esg-tit3.png" alt=""></p>
          </div>
          <img src="./common/images/main-esg-desc.png" alt="" class="desc">
        </div>

        <div class="bg-area">
          <img src="./common/images/main-esg-bg.png" alt="">
        </div>

        <div class="view-more-btn-wrap">
          <img src="./common/images/main-ico-view-more.png" alt="">
          <span>기업소개 더보기</span>
        </div>
      </section>

      <!-- newsroom -->
      <section class="news-wrap">
        <div class="inner">
          <div class="tit-area">
            <img src="./common/images/main-news-tit.png" alt="">
            <img src="./common/images/main-news-btn.png" alt="">
          </div>
          <div class="list-area">
            <img src="./common/images/main-news-item1.png" alt="">
            <img src="./common/images/main-news-item2.png" alt="">
            <img src="./common/images/main-news-item3.png" alt="">
            <img src="./common/images/main-news-item4.png" alt="">
            <img src="./common/images/main-news-item5.png" alt="">
            <img src="./common/images/main-news-item6.png" alt="">
          </div>
        </div>
      </section>

      <!-- banner -->
      <section class="banner-wrap">
        <a href="javascript:">
          <img src="./common/images/main-banner-cate.png" alt="">
          <img src="./common/images/main-banner-tit.png" alt="">
          <img src="./common/images/main-banner-btn.png" alt="">
        </a>
      </section>

      <!-- floating button -->
      <div class="floating-btn-wrap">
        <div class="util-btn-area">
          <img src="./common/images/main-fixed-util-btn1.png" alt="">
          <img src="./common/images/main-fixed-util-btn2.png" alt="">
          <img src="./common/images/main-fixed-util-btn3.png" alt="">
          <img src="./common/images/main-fixed-util-btn4.png" alt="">
          <a href="javascript:"></a>
        </div>
        <div class="chatbot-area">
          <a href="javascript:"></a>
          <div class="chat-bg">
            <div class="chat">
              <img src="./common/images/main-chat.jpg" alt="">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- dimd-->
    <div class="dimd"></div>

    <!-- footer -->
    <footer>
      <a href="javascript:">
        <div class="inner">
          <img src="./common/images/main-footer.svg" alt="">
        </div>
      </a>
    </footer>
  </body>
</html>
