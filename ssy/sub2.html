<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="./common/css/swiper.css" />
    <link rel="stylesheet" href="./common/css/fonts.css" />
    <link rel="stylesheet" href="./common/css/style-sub2.css" />
    <title>쌍용 더 플래티넘 제안</title>
  </head>

  <body>
    <div class="wrap">
      <header class="header">
        <div class="inner">
          <h1 class="logo">
            <a href="javascript:">
              <img src="./common/images/logo.svg" alt="">
            </a>
          </h1>
          <div class="gnb">
            <img src="./common/images/lnb.png" alt="">
          </div>
          <div class="util">
            <img src="./common/images/util.png" alt="">
          </div>
        </div>
      </header>

      <div class="content">
        <div class="top inner">
          <p class="tit motion">
            <img src="./common/images/sub2-title.png" alt="">
          </p>
          <div class="notice motion">
            <img src="./common/images/sub2-sub-title.png" alt="">
          </div>
          <div class="tab motion">
            <img src="./common/images/sub2-content-tab.png" alt="">
          </div>
        </div>

        <!-- 분양/계약정보 -->
        <section class="section1">
          <div class="inner scroll-motion">
            <p class="tit">
              <img src="./common/images/sub2-section1-title.png" alt="">
            </p>
            <div class="info-wrap">
              <div class="txt-box">
                <img src="./common/images/sub2-section1-txt1.png" alt="">
                <img src="./common/images/sub2-section1-txt2.png" alt="">
                <div class="progress-wrap">
                  <div class="progress-thumb"></div>
                  <div class="progress-track">
                    <span></span>
                    <img src="./common/images/sub2-section1-progress-track.svg" alt="">
                  </div>
                  <img src="./common/images/sub2-section1-progress.png" alt="">
                </div>
                <img src="./common/images/sub2-section1-txt3.png" alt="">
              </div>
              <div class="img-box">
                <img src="./common/images/sub2-section1-img.jpg" alt="">
              </div>
            </div>
          </div>
        </section>

        <!-- 예약서비스 신청내역 -->
        <section class="section2">
          <div class="inner scroll-motion">
            <p class="tit">
              <img src="./common/images/sub2-section2-title.png" alt="">
            </p>
            <div class="list-wrap">
              <div class="list-item">
                <img src="./common/images/sub2-section2-img1.png" alt="">
              </div>
              <div class="list-item">
                <img src="./common/images/sub2-section2-img2.png" alt="">
              </div>
            </div>
          </div>
        </section>

        <!-- A/S 신청내역 -->
        <section class="section3 bg">
          <div class="inner scroll-motion">
            <p class="tit">
              <img src="./common/images/sub2-section3-title.png" alt="">
            </p>
            <div class="list-wrap">
              <div class="list-item">
                <img src="./common/images/sub2-section3-img1.jpg" alt="">
              </div>
              <div class="list-item">
                <img src="./common/images/sub2-section3-img2.jpg" alt="">
              </div>
              <div class="list-item">
                <img src="./common/images/sub2-section3-img3.jpg" alt="">
              </div>
            </div>
          </div>
        </section>

        <!-- 나의 관심 단지 -->
        <section class="section4">
          <div class="inner scroll-motion">
            <img src="./common/images/sub2-section4-img.png" alt="">
          </div>
        </section>

        <!-- 나의 문의 내역 -->
        <section class="section5 bg">
          <div class="inner scroll-motion">
            <p class="tit">
              <img src="./common/images/sub2-section5-title.png" alt="">
            </p>
            <div class="list-wrap">
              <div class="list-item">
                <img src="./common/images/sub2-section5-img1.jpg" alt="">
              </div>
              <div class="list-item">
                <img src="./common/images/sub2-section5-img2.jpg" alt="">
              </div>
              <div class="list-item">
                <img src="./common/images/sub2-section5-img3.jpg" alt="">
              </div>
            </div>
          </div>
        </section>
      </div>

      <footer>
        <a href="javascript:">
          <img src="./common/images/footer.jpg" alt="">
        </a>
      </footer>
    </div>

    <script src="./common/js/jquery-1.8.2.min.js"></script>
    <script src="./common/js/gsap.min.js"></script>
    <script src="./common/js/ScrollTrigger.min.js"></script>
    <script src="./common/js/swiper.min.js"></script>
    <script src="./common/js/sub2.js"></script>
  </body>
</html>
