<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common/css/swiper.css" />
    <link rel="stylesheet" href="./common/css/fonts.css" />
    <link rel="stylesheet" href="./common/css/style-mainB.css" />
    <script src="./common/js/jquery-1.8.2.min.js"></script>
    <script src="./common/js/swiper.min.js"></script>
    <script src="./common/js/gsap.min.js"></script>
    <script src="./common/js/ScrollToPlugin.min.js"></script>
    <script src="./common/js/ScrollTrigger.min.js"></script>
    <script src="./common/js/mainB.js"></script>
    <title>압구정현대아파트 제안</title>
  </head>

  <body>
    <!-- header -->
    <header>
      <a href="javscript:">
        <img src="./common/images/main-icon-logo-wht.png" alt="" class="wht active">
        <img src="./common/images/main-icon-logo.png" alt="" class="bk">
      </a>
      <a href="javascript:" class="menu-btn">
        <img src="./common/images/main-icon-menu-wht.png" alt="" class="wht active">
        <img src="./common/images/main-icon-menu.png" alt="" class="bk">
      </a>
      <a href="javascript:" class="gnb-full-btn"></a>
    </header>

    <div class="menu-area">
      <a href="javascript:">
        <img src="./common/images/main-gnb-full.jpg" alt="">
      </a>
    </div>

    <!-- content -->
    <div id="mainBody">
      <!-- kv -->
      <section class="kv-area">
        <div class="swiper-wrapper">
          <div class="swiper-slide wht">
            <div class="masking-box">
              <div class="masking-item"><img src="./common/images/main-masking-a.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-p.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-g.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-u.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-j.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-e.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-o.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-n.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-g.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-h.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-y.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-u.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-n.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-d.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-a.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-i.png" alt=""></div>
            </div>
            <a href="javascript:" class="gnb">
              <img src="./common/images/main-gnb-wht.png" alt="">
            </a>
            <div class="bg">
              <video src="./common/videos/main-kv-vid.mp4" muted autoplay loop></video>
            </div>
          </div>
          <div class="swiper-slide bk hide">
            <div class="masking-box">
              <div class="masking-item"><img src="./common/images/main-masking-a-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-p-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-g-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-u-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-j-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-e-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-o-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-n-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-g-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-h-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-y-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-u-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-n-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-d-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-a-bk.png" alt=""></div>
              <div class="masking-item"><img src="./common/images/main-masking-i-bk.png" alt=""></div>
            </div>
            <a href="javascript:" class="gnb">
              <img src="./common/images/main-gnb.png" alt="">
            </a>
            <div class="bg">
              <img src="./common/images/main-img-kv-bg.jpg" alt="">
            </div>
          </div>
        </div>
      </section>

      <!-- membership service -->
      <section class="mem-area">
        <div class="flex">
          <div class="tit-box">
            <p>
              <img src="./common/images/main-mem-tit1.png" alt="">
            </p>
            <p>
              <img src="./common/images/main-mem-tit2.png" alt="">
            </p>
            <img src="./common/images/main-mem-desc.png" alt="" class="desc">
          </div>
          <div class="mem-list">
            <img src="./common/images/main-mem-item1.png" alt="" class="mem-item">
            <img src="./common/images/main-mem-item2.png" alt="" class="mem-item">
            <img src="./common/images/main-mem-item3.png" alt="" class="mem-item">
          </div>
        </div>
      </section>

      <!-- content -->
      <section class="cont-area">
        <div class="cont-box">
          <div class="cont-tit">
            <div class="img-box">
              <img src="./common/images/main-philosophy-tit.png" alt="">
              <img src="./common/images/main-highlights-tit.png" alt="">
              <img src="./common/images/main-membership-tit.png" alt="">
            </div>
          </div>
          <div class="cont-sub-tit">
            <img src="./common/images/main-philosophy-sub-txt1.png" alt="">
            <img src="./common/images/main-philosophy-sub-txt2.png" alt="">
          </div>
          <div class="right">
            <div class="cont-desc">
              <div class="cont-img">
                <div class="img-item img-philosophy">
                  <img src="./common/images/main-philosophy-img.jpg" alt="">
                </div>
                <div class="img-item img-highlights">
                  <img src="./common/images/main-highlights-img.jpg" alt="">
                </div>
                <div class="img-item img-membership">
                  <img src="./common/images/main-membership-img.jpg" alt="">
                </div>
              </div>
              <div class="cont-txt">
                <div class="txt-item">
                  <img src="./common/images/main-philosophy-sub-tit.png" alt="" class="item-sub-tit">
                  <div class="list">
                    <div class="list-item">
                      <img src="./common/images/main-philosophy-desc1.png" alt="">
                    </div>
                    <div class="list-item">
                      <img src="./common/images/main-philosophy-desc2.png" alt="">
                    </div>
                    <div class="list-item">
                      <img src="./common/images/main-philosophy-desc3.png" alt="">
                    </div>
                  </div>
                </div>
                <div class="txt-item">
                  <img src="./common/images/main-highlights-sub-tit.png" alt="" class="item-sub-tit">
                  <div class="list">
                    <div class="list-item">
                      <img src="./common/images/main-highlights-desc1.png" alt="">
                    </div>
                    <div class="list-item">
                      <img src="./common/images/main-highlights-desc2.png" alt="">
                    </div>
                    <div class="list-item">
                      <img src="./common/images/main-highlights-desc3.png" alt="">
                    </div>
                  </div>
                </div>
                <div class="txt-item">
                  <img src="./common/images/main-membership-sub-tit.png" alt="" class="item-sub-tit">
                  <div class="list">
                    <div class="list-item">
                      <img src="./common/images/main-membership-desc1.png" alt="">
                    </div>
                    <div class="list-item">
                      <img src="./common/images/main-membership-desc2.png" alt="">
                    </div>
                    <div class="list-item">
                      <img src="./common/images/main-membership-desc3.png" alt="">
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="cont-bg">
          <div class="bg-item philosophy-bg">
            <img src="./common/images/main-philosophy-bg.jpg" alt="">
            <div class="dimd"></div>
          </div>
          <div class="bg-item highlights-bg">
            <img src="./common/images/main-highlights-bg.jpg" alt="">
            <div class="dimd"></div>
          </div>
          <div class="bg-item membership-bg">
            <img src="./common/images/main-membership-bg.jpg" alt="">
            <div class="dimd"></div>
          </div>
        </div>
      </section>

      <!-- news -->
      <section class="news-area">
        <div class="inner">
          <div class="tit-box scrl-motion">
            <div class="txt">
              <p>
                <img src="./common/images/main-news-tit.png" alt="">
              </p>
              <img src="./common/images/main-news-desc.png" alt="" class="desc">
            </div>
            <img src="./common/images/main-icon-more.png" alt="">
          </div>
          <div class="news-list">
            <img src="./common/images/main-news-item1.png" alt="" class="news-item">
            <img src="./common/images/main-news-item2.png" alt="" class="news-item">
            <img src="./common/images/main-news-item3.png" alt="" class="news-item">
            <img src="./common/images/main-news-item4.png" alt="" class="news-item">
          </div>
        </div>
      </section>

      <!-- pop-up -->
      <section class="pop-area">
        <a href="javascript:" class="util-btn fixed">
          <img src="./common/images/main-fixed-util2.png" alt="" class="util">
          <img src="./common/images/main-fixed-util.png" alt="" class="util">
        </a>
        <div class="pop-wrap">
          <div class="pop-box active">
            <div class="tit">
              <img src="./common/images/main-pop-tit1.png" alt="">
            </div>
            <div class="list">
              <a href="javascript:" class="item"><img src="./common/images/main-pop-item1.png" alt=""></a>
              <a href="javascript:" class="item"><img src="./common/images/main-pop-item2.png" alt=""></a>
              <a href="javascript:" class="item"><img src="./common/images/main-pop-item3.png" alt=""></a>
            </div>
            <img src="./common/images/main-pop-close-btn.png" alt="" class="close-btn">
          </div>
          <div class="pop-box">
            <a href="javascript:" class="close">
              <div class="tit">
                <img src="./common/images/main-pop-tit2.png" alt="">
              </div>
              <img src="./common/images/main-pop-calendar.png" alt="" class="calendar">
              <img src="./common/images/main-pop-close-btn.png" alt="" class="close-btn">
            </a>
          </div>
        </div>
      </section>
    </div>

    <!-- footer -->
    <footer>
      <a href="javscript:">
        <div class="inner">
          <img src="./common/images/main-footer.png" alt="">
        </div>
      </a>
    </footer>
  </body>
</html>
